<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nana's raider</title>
    <style>
        :root {
            --bg: #050508;
            --panel: rgba(15, 15, 25, 0.85);
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
            --text-main: #f0f0f0;
            --text-dim: #9494b8;
            --success: #39ff14;
            --error: #ff0055;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            align-self: center;
        }

        h2 {
            margin: 0 0 20px 0;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .field-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--accent-primary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input, textarea, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
        }

        button {
            border-radius: 10px;
            padding: 14px;
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn-check {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #000;
        }

        .btn-start:hover:not(:disabled) {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .btn-stop {
            background: #1a1a1a;
            color: #444;
        }

        .btn-stop.active {
            background: var(--error);
            color: #fff;
        }

        #log {
            margin-top: 20px;
            height: 160px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 0.7rem;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry { border-bottom: 1px solid rgba(255, 255, 255, 0.02); padding: 3px 0; }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
    </style>
</head>
<body>

<div class="container">
    <h2>nana's raider</h2>

    <div class="field-group">
        <label>アクセストークン (1行に1つ)</label>
        <textarea id="tokens" rows="3" placeholder="Token..."></textarea>
    </div>

    <div class="grid field-group">
        <div>
            <label>チャンネルID</label>
            <input type="text" id="channelId" placeholder="ID...">
        </div>
        <div>
            <label>間隔 (ms)</label>
            <input type="number" id="delay" value="1000">
        </div>
    </div>

    <div class="field-group">
        <label>カスタムメッセージ (カンマ区切り)</label>
        <textarea id="messages" rows="2" placeholder="メッセージ1, メッセージ2..."></textarea>
    </div>

    <div class="grid field-group">
        <button class="btn-check" onclick="checkTokens()">トークン確認</button>
        <select id="mode">
            <option value="1">並列モード</option>
            <option value="2">順次モード</option>
        </select>
    </div>

    <div class="grid">
        <button id="startBtn" class="btn-start" onclick="startRaiding()">システム起動</button>
        <button id="stopBtn" class="btn-stop" onclick="stopRaiding()" disabled>緊急停止</button>
    </div>

    <div id="log">// 準備完了</div>
</div>

<script>
    let isRunning = false;

    const logger = (msg, type) => {
        const logBox = document.getElementById('log');
        const className = type === 'error' ? 'log-error' : (type === 'success' ? 'log-success' : '');
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML = `<div class="log-entry ${className}">[${time}] ${msg}</div>` + logBox.innerHTML;
    };

    function startRaiding() {
        const tks = document.getElementById('tokens').value.trim();
        const cid = document.getElementById('channelId').value.trim();
        if(!tks || !cid) return alert("トークンとIDを入力してください");

        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('stopBtn').classList.add('active');
        logger("RAID開始", "success");
        runLoop();
    }

    function stopRaiding() {
        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('stopBtn').classList.remove('active');
        logger("システム停止", "error");
    }

    async function runLoop() {
        while (isRunning) {
            const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
            const cid = document.getElementById('channelId').value.trim();
            const dly = parseInt(document.getElementById('delay').value) || 1000;
            const msgs = document.getElementById('messages').value.split(',').map(m => m.trim()).filter(m => m);
            
            const tasks = tks.map(async (t) => {
                if(!isRunning) return;

                let content = msgs.length > 0 
                    ? msgs[Math.floor(Math.random() * msgs.length)] 
                    : "# Raid by 雑草!!\n@everyone @here";
                
                // 重複回避用のランダムタグ
                content += " _[" + Math.random().toString(36).substring(2, 7) + "]_";

                try {
                    const res = await fetch(`https://discord.com/api/v9/channels/${cid}/messages`, {
                        method: 'POST',
                        headers: { 'Authorization': t.trim(), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: content })
                    });
                    if(res.ok) logger(`送信成功: ${t.substring(0,8)}...`, "success");
                    else logger(`失敗: ${res.status}`, "error");
                } catch (e) { logger("通信エラー", "error"); }
            });

            if(document.getElementById('mode').value === "1") {
                await Promise.all(tasks);
                await new Promise(r => setTimeout(r, dly));
            } else {
                for(let task of tasks) {
                    if(!isRunning) break;
                    await task;
                    await new Promise(r => setTimeout(r, dly / tks.length));
                }
            }
        }
    }

    async function checkTokens() {
        const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
        logger("確認中...", "");
        for (const t of tks) {
            try {
                const r = await fetch('https://discord.com/api/v9/users/@me', { headers: { 'Authorization': t.trim() } });
                const data = await r.json();
                logger(r.ok ? `有効: ${data.username}` : "無効なトークン", r.ok ? "success" : "error");
            } catch(e) { logger("接続失敗", "error"); }
        }
    }
</script>
</body>
</html>
